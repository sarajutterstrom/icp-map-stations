<script>
    
    
(function() {
    function initStationFilters() {
    var stationData = [{"station_name": "Pipb\u00e4cken Nedre", "country": "Sweden", "latitude": 57.06621756, "longitude": 12.78971457, "icp_list": ["ICP Waters"], "measurement_list": ["runoff", "soilwater", "throughfall"], "color": "blue"}, {"station_name": "Aneboda", "country": "Sweden", "latitude": 57.1137, "longitude": 14.55, "icp_list": ["ICP IM", "ICP Vegetation"], "measurement_list": ["soil", "open field", "throughfall"], "color": "gray"}, {"station_name": "Lange Bramke", "country": "Germany", "latitude": 51.855, "longitude": 10.421, "icp_list": ["ICP Waters"], "measurement_list": ["runoff", "lake chemistry"], "color": "blue"}, {"station_name": "Pallas", "country": "Finland", "latitude": 67.9667, "longitude": 24.1167, "icp_list": ["ICP Vegetation"], "measurement_list": ["vegetation"], "color": "orange"}, {"station_name": "Z\u00f6belboden", "country": "Austria", "latitude": 47.84224607, "longitude": 14.44413616, "icp_list": ["ICP IM"], "measurement_list": ["runoff", "lake chemistry", "deposition"], "color": "red"}, {"station_name": "Rjukan-Notodden Industrial Heritage Site", "country": "Norway", "latitude": 59.556, "longitude": 9.26, "icp_list": ["ICP Materials"], "measurement_list": ["limestone recession", "glass soiling"], "color": "purple"}, {"station_name": "Myrberg", "country": "Sweden", "latitude": 66.04, "longitude": 20.3743, "icp_list": ["ICP Forest"], "measurement_list": ["soil", "vegetation"], "color": "green"}];
    var allIcps = ["ICP Forest", "ICP IM", "ICP Materials", "ICP Vegetation", "ICP Waters"];
    var allMeasurements = ["deposition", "glass soiling", "lake chemistry", "limestone recession", "open field", "runoff", "soil", "soilwater", "throughfall", "vegetation"];
    var showCoordinates = false;
    var mapRef = map_66f2e0850a6727a0697b3772184ea0de;
    var markerLayer = L.layerGroup().addTo(mapRef);
    var activeMarkers = [];

    function escapeHtml(text) {
        if (text === null || text === undefined) return "";
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function buildCheckboxes(containerId, values, className) {
        var container = document.getElementById(containerId);
        values.forEach(function(value) {
            var safeValue = escapeHtml(value);
            var row = document.createElement("label");
            row.className = "filter-option";
            row.innerHTML = '<input type="checkbox" class="' + className + '" value="' + safeValue + '" checked> ' + safeValue;
            container.appendChild(row);
        });
    }

    window.setAllChecks = function(className, checked) {
        document.querySelectorAll('.' + className).forEach(function(cb) {
            cb.checked = checked;
        });
        updateMap();
    };

    function getSelectedValues(className) {
        return Array.from(document.querySelectorAll('.' + className + ':checked')).map(function(cb) {
            return cb.value;
        });
    }

    function matchesAny(stationValues, selectedValues) {
        if (selectedValues.length === 0) return true;
        return stationValues.some(function(v) { return selectedValues.includes(v); });
    }

    function buildPopupHtml(station) {
        var icpText = station.icp_list.length ? station.icp_list.join(', ') : 'Not specified';
        var measurementText = station.measurement_list.length ? station.measurement_list.join(', ') : 'Not specified';

        var html = '' +
            '<div style="width: 270px; line-height: 1.5;">' +
                '<div style="font-size: 15px; font-weight: 700; margin-bottom: 8px;">' + escapeHtml(station.station_name) + '</div>' +
                '<div><b>Country:</b> ' + escapeHtml(station.country || '') + '</div>' +
                '<div class="popup-block">' +
                    '<b>ICP responsible</b><br>' +
                    escapeHtml(icpText) +
                '</div>' +
                '<div class="popup-block">' +
                    '<b>Measurements</b><br>' +
                    escapeHtml(measurementText) +
                '</div>';

        if (showCoordinates) {
            html += '' +
                '<div class="popup-block">' +
                    '<b>Coordinates</b><br>' +
                    'Lat: ' + station.latitude.toFixed(5) + '<br>' +
                    'Lon: ' + station.longitude.toFixed(5) +
                '</div>';
        }

        html += '</div>';
        return html;
    }

    function updateMap() {
        var selectedIcps = getSelectedValues('icp-filter');
        var selectedMeasurements = getSelectedValues('measurement-filter');

        markerLayer.clearLayers();
        activeMarkers = [];

        stationData.forEach(function(station) {
            var icpMatch = matchesAny(station.icp_list, selectedIcps);
            var measurementMatch = matchesAny(station.measurement_list, selectedMeasurements);

            if (icpMatch && measurementMatch) {
                var marker = L.circleMarker([station.latitude, station.longitude], {
                    radius: 6,
                    color: 'black',
                    weight: 1,
                    fillColor: station.color,
                    fillOpacity: 0.95
                });

                marker.bindPopup(buildPopupHtml(station), {maxWidth: 320});
                marker.bindTooltip(escapeHtml(station.station_name));
                marker.addTo(markerLayer);
                activeMarkers.push(marker);
            }
        });

        var countEl = document.getElementById('station-count');
        countEl.innerHTML = '<b>Stations shown:</b> ' + activeMarkers.length;

        if (activeMarkers.length > 0) {
            var group = L.featureGroup(activeMarkers);
            mapRef.fitBounds(group.getBounds(), {padding: [30, 30]});
        }
    }

    buildCheckboxes('icp-filter-box', allIcps, 'icp-filter');
    buildCheckboxes('measurement-filter-box', allMeasurements, 'measurement-filter');

    document.querySelectorAll('.icp-filter, .measurement-filter').forEach(function(cb) {
        cb.addEventListener('change', updateMap);
    });

    updateMap();
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initStationFilters);
    } else {
        initStationFilters();
    }
})();

            L.control.fullscreen(
                {
  "position": "topright",
  "title": "Full Screen",
  "titleCancel": "Exit Full Screen",
  "forceSeparateButton": false,
}
            ).addTo(map_66f2e0850a6727a0697b3772184ea0de);
        
    
            var tile_layer_c3ee9cb55362a15736b4b6d4b08531c3 = L.tileLayer(
                "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
                {"attribution": "\u0026copy; \u003ca href=\"https://www.openstreetmap.org/copyright\"\u003eOpenStreetMap\u003c/a\u003e contributors", "detect_retina": false, "max_native_zoom": 19, "max_zoom": 19, "min_zoom": 0, "no_wrap": false, "opacity": 1, "subdomains": "abc", "tms": false}
            );
            var mini_map_673aa83da8325305044ccbd8d9084fcd = new L.Control.MiniMap(
                tile_layer_c3ee9cb55362a15736b4b6d4b08531c3,
                {

  "width": 150,
  "height": 150,

  "centerFixed": false,
  "zoomAnimation": false,
  "toggleDisplay": true,
  "autoToggleDisplay": false,
  "minimized": false,
}
            );
            map_66f2e0850a6727a0697b3772184ea0de.addControl(mini_map_673aa83da8325305044ccbd8d9084fcd);
        
</script>
